# Home Assistant add-on manifest (local add-on)
name: AI Trade Platform
version: "0.12.0"
slug: tradebot
description: Fee-bewust AI swing-tradingplatform (Bitvavo, paper trading)
url: "https://github.com/MartinDoornbusch/martin-trade"
arch:
  - aarch64
  - amd64
# Voor de add-on-repository flow (optie B, automatische updates): regel hieronder
# aanzetten met je GitHub-gebruikersnaam. Supervisor pullt dan het CI-gebouwde image
# i.p.v. lokaal te bouwen.
image: ghcr.io/martindoornbusch/tradebot-addon-{arch}
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8000
panel_icon: mdi:finance
panel_title: Trade Platform
ports:
  8000/tcp: null        # standaard dicht; ingress volstaat. Zet op 8000 voor directe LAN-toegang.
ports_description:
  8000/tcp: Dashboard (optioneel, alleen nodig zonder ingress)
map:
  - addon_config:rw
options:
  trading_mode: paper
  markets: "BTC-EUR,ETH-EUR"
  watchlist: "SOL-EUR,XRP-EUR,LINK-EUR"
  analysis_interval_minutes: 60
  candle_interval: 4h
  max_position_pct: 25
  max_open_positions: 3
  cooldown_hours: 12
  live_confirm: ""
  live_max_capital_eur: 100
  bitvavo_api_key: ""
  bitvavo_api_secret: ""
  groq_api_key: ""
  gemini_api_key: ""
  mistral_api_key: ""
  telegram_bot_token: ""
  telegram_chat_id: ""
  dashboard_token: ""
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
schema:
  trading_mode: list(paper|live)
  markets: str
  watchlist: str
  analysis_interval_minutes: int(15,1440)
  candle_interval: list(1h|2h|4h|6h|8h|12h|1d)
  max_position_pct: int(5,50)
  max_open_positions: int(1,5)
  cooldown_hours: int(1,72)
  live_confirm: str
  live_max_capital_eur: int(10,1000)
  bitvavo_api_key: str
  bitvavo_api_secret: password
  groq_api_key: password
  gemini_api_key: password
  mistral_api_key: password
  telegram_bot_token: password
  telegram_chat_id: str
  dashboard_token: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: password
