name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Unit tests (pytest)
        run: pytest -q
        env:
          PYTHONPATH: src
      - name: Security scan (bandit)
        run: bandit -r src -ll
      - name: Dependency audit (pip-audit)
        run: pip-audit -r requirements.txt
        continue-on-error: true   # audit-fouten blokkeren niet, wel zichtbaar

  docker:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  addon-image:
    # HA add-on image (aarch64 voor de Pi 5). Versie komt uit tradebot-addon/config.yaml;
    # een versie-bump op main triggert de update-notificatie / auto-update in Home Assistant.
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lees add-on versie
        id: ver
        run: |
          v=$(sed -n 's/^version: *"\{0,1\}\([^"]*\)"\{0,1\}$/\1/p' tradebot-addon/config.yaml)
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Vul build context
        run: ./tradebot-addon/sync.sh
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push add-on image (aarch64)
        uses: docker/build-push-action@v6
        with:
          context: tradebot-addon
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tradebot-addon-aarch64:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/tradebot-addon-aarch64:latest
